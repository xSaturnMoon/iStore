name: Build iStore IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build IPA (Unsigned)
        run: |
          xcodebuild archive \
            -project iStore.xcodeproj \
            -scheme iStore \
            -configuration Release \
            -archivePath build/iStore.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

          mkdir -p Payload
          cp -r build/iStore.xcarchive/Products/Applications/iStore.app Payload/
          zip -r iStore.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iStore-Unsigned-IPA
          path: iStore.ipa
